<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الرئيسية — ERP مقاولات</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Tahoma,sans-serif; background:#f0f2f5; }
  .navbar { background:#1a2744; color:white; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
  .navbar h1 { font-size:18px; }
  .navbar a { color:#adb5d6; text-decoration:none; font-size:13px; }
  .navbar a:hover { color:white; }
  .container { max-width:900px; margin:40px auto; padding:0 24px; }
  .welcome { background:white; border-radius:16px; padding:32px; text-align:center; margin-bottom:24px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
  .welcome h2 { color:#1a2744; margin-bottom:8px; }
  .welcome p { color:#666; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .card { background:white; border-radius:14px; padding:28px; text-align:center; text-decoration:none; box-shadow:0 1px 4px rgba(0,0,0,0.08); transition:transform 0.2s; }
  .card:hover { transform:translateY(-4px); }
  .card .icon { font-size:40px; margin-bottom:12px; }
  .card .title { color:#1a2744; font-weight:700; font-size:15px; }
</style>
</head>
<body>
<div class="navbar">
  <h1>🏗️ ERP مقاولات</h1>
  <a href="/api/auth/logout">خروج</a>
</div>
<div class="container">
  <div class="welcome">
    <h2>Welcom to Al-Israa Company ERP</h2>
    <p>Choose the section you want</p>
  </div>
  <div class="grid">
    <a href="/hr" class="card">
      <div class="icon">👥</div>
      <div class="title">الموارد البشرية</div>
    </a>
    <a href="/accounting" class="card">
      <div class="icon">💰</div>
      <div class="title">الحسابات</div>
    </a>
    <a href="#" class="card">
      <div class="icon">📦</div>
      <div class="title">المخازن (قريباً)</div>
    </a>
  </div>
</div>
</body>
</html>
